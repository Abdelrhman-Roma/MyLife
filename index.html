<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYLIFE | Login</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/pages/auth.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body data-page="auth">
    <main class="auth-page">
      <section class="auth-visual" aria-label="MYLIFE app preview">
        <div class="auth-visual-media">
          <div id="auth-hero-image" class="auth-hero-image auth-hero-art" aria-hidden="true"></div>
          <div class="auth-visual-overlay">
            <div class="auth-site-logo" aria-label="MYLIFE">M</div>
            <div class="auth-copy">
              <p class="eyebrow">Private life tracker</p>
              <h1>MYLIFE</h1>
              <p>
                Track tasks, habits, goals, workouts, nutrition, sleep, and more
                — all in one place, saved privately per account.
              </p>
            </div>
          </div>
        </div>
      </section>

      <section class="auth-card">
        <div id="login-panel">
          <p class="eyebrow">Welcome back</p>
          <h2>Login</h2>
          <form id="login-form" class="form-stack">
            <label
              >Email
              <input
                id="login-email"
                type="email"
                autocomplete="email"
                placeholder="you@email.com"
                required
              />
            </label>
            <label
              >Password
              <input
                id="login-password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
            </label>
            <p class="form-message" id="login-message" role="alert"></p>
            <button class="primary-btn" type="submit">Login</button>
          </form>
          <button class="text-btn" id="show-register" type="button">
            Create account →
          </button>
        </div>

        <div id="register-panel" class="hidden">
          <p class="eyebrow">New account</p>
          <h2>Register</h2>
          <form id="register-form" class="form-stack">
            <label
              >Full name
              <input
                id="register-name"
                autocomplete="name"
                placeholder="Ahmed Farouk"
                required
              />
            </label>
            <label
              >Email
              <input
                id="register-email"
                type="email"
                autocomplete="email"
                placeholder="you@email.com"
                required
              />
            </label>
            <label
              >Password
              <input
                id="register-password"
                type="password"
                minlength="6"
                autocomplete="new-password"
                placeholder="Min 6 characters"
                required
              />
            </label>
            <label
              >Confirm password
              <input
                id="register-confirm"
                type="password"
                minlength="6"
                autocomplete="new-password"
                placeholder="Repeat password"
                required
              />
            </label>
            <p class="form-message" id="register-message" role="alert"></p>
            <button class="primary-btn" type="submit">Create account</button>
          </form>
          <button class="text-btn" id="show-login" type="button">
            ← Back to login
          </button>
        </div>
      </section>
    </main>

    <script src="js/shared.js"></script>
    <script src="js/pages/auth.js"></script>
  </body>
</html>
