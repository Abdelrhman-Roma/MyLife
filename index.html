<!doctype html>
<!-- ده الملف الرئيسي لصفحة تسجيل الدخول في مشروع MYLIFE -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYLIFE | Login</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="auth">
    <!-- ده القسم الرئيسي لصفحة تسجيل الدخول والتسجيل -->
    <main class="auth-page">
      <section class="auth-visual" aria-label="MYLIFE dashboard design preview">
        <div class="mock-browser">
          <div class="mock-sidebar">
            <div class="mock-logo"></div>
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="mock-main">
            <div class="mock-top"></div>
            <div class="mock-hero">
              <div>
                <b></b>
                <strong></strong>
                <p></p>
              </div>
              <i></i>
            </div>
            <div class="mock-stats">
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="mock-grid"><span></span><span></span><span></span></div>
          </div>
        </div>
        <div class="auth-copy">
          <p class="eyebrow">Private life tracker</p>
          <h1>MYLIFE</h1>
          <p>
            Login or register before using the dashboard. Every task, habit,
            goal, and setting is saved for the active user only.
          </p>
        </div>
      </section>

      <!-- ده القسم اللي بيعرض فورم تسجيل الدخول أو إنشاء حساب جديد -->
      <section class="auth-card">
        <div id="login-panel">
          <p class="eyebrow">Welcome back</p>
          <h2>Login</h2>
          <form id="login-form" class="form-stack">
            <label
              >Email<input
                id="login-email"
                type="email"
                autocomplete="email"
                required
            /></label>
            <label
              >Password<input
                id="login-password"
                type="password"
                autocomplete="current-password"
                required
            /></label>
            <p class="form-message" id="login-message"></p>
            <button class="primary-btn" type="submit">Login</button>
          </form>
          <button class="text-btn" id="show-register" type="button">
            Create account
          </button>
        </div>

        <div id="register-panel" class="hidden">
          <p class="eyebrow">New account</p>
          <h2>Register</h2>
          <form id="register-form" class="form-stack">
            <label
              >Full name<input id="register-name" autocomplete="name" required
            /></label>
            <label
              >Email<input
                id="register-email"
                type="email"
                autocomplete="email"
                required
            /></label>
            <label
              >Password<input
                id="register-password"
                type="password"
                minlength="6"
                autocomplete="new-password"
                required
            /></label>
            <label
              >Confirm password<input
                id="register-confirm"
                type="password"
                minlength="6"
                autocomplete="new-password"
                required
            /></label>
            <p class="form-message" id="register-message"></p>
            <button class="primary-btn" type="submit">Register</button>
          </form>
          <button class="text-btn" id="show-login" type="button">
            Back to login
          </button>
        </div>
      </section>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
