<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Log in to MYLIFE to manage your tasks, habits, goals, health, and study progress." />
    <title>Login - MYLIFE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-art">
        <a class="brand" href="index.html">
          <span class="brand-mark">M</span>
          <span><strong>MYLIFE</strong><small>Life Tracker</small></span>
        </a>
        <div>
          <h1>Welcome back.</h1>
          <p>Track your day, protect your streak, and keep the next action clear.</p>
        </div>
        <div class="auth-preview">
          <span>Daily Progress</span>
          <strong>78%</strong>
          <div class="progress-track"><span class="purple" style="width: 78%"></span></div>
        </div>
      </section>
      <section class="auth-card card">
        <h2>Log in</h2>
        <p>Use your MYLIFE account to continue.</p>
        <form data-auth-form="login">
          <label>Email<input type="email" name="email" autocomplete="email" required /></label>
          <label>Password<input type="password" name="password" autocomplete="current-password" required /></label>
          <button class="primary-action" type="submit">Log In</button>
        </form>
        <p class="auth-switch">New to MYLIFE? <a href="register.html">Create account</a></p>
      </section>
    </main>
    <script src="js/auth.js" defer></script>
  </body>
</html>
