<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan your month, week, and day, and see every MYLIFE activity in one calendar." />
    <title>MYLIFE | Calendar</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/pages/calendar.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body data-page="calendar">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-panel">
        <header class="topbar" id="topbar"></header>
        <section class="page-art" id="page-art"></section>
        <section class="stats-grid" id="stats-grid"></section>
        <section class="calendar-sections" id="calendar-root">
          <div class="cal-skeleton" aria-hidden="true">
            <div class="cal-skeleton-bar" style="height:64px"></div>
            <div class="cal-skeleton-bar" style="height:420px"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="../js/shared.js" defer></script>
    <script src="../js/calendar.js" defer></script>
    <script src="../js/pages/calendar.js" defer></script>
  </body>
</html>
