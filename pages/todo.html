<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYLIFE | Todo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body data-page="todo">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-panel">
        <header class="topbar" id="topbar"></header>
        <section class="page-art" id="page-art"></section>
        <section class="stats-grid" id="stats-grid"></section>
        <section class="content-grid">
          <div class="panel">
            <p class="eyebrow" id="form-kicker"></p>
            <h2 id="form-title"></h2>
            <form id="entry-form" class="form-stack" novalidate></form>
          </div>
          <div class="panel">
            <p class="eyebrow">Your data</p>
            <h2 id="list-title"></h2>
            <div class="data-list" id="data-list"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="../js/shared.js"></script>
    <script src="../js/pages/todo.js"></script>
  </body>
</html>
