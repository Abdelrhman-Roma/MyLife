<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan weekly workouts, track sets, reps, weight, rest timers, and training progress in MYLIFE." />
    <title>MYLIFE | Workout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" /></noscript>
    <style>
      :root{--font-body:Inter,Segoe UI,Arial,sans-serif;--font-mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace}
      body{min-height:100dvh;margin:0;overflow-x:hidden;background:#0a0b0d;color:#ece4d0;font-family:var(--font-body)}
      .app-shell{min-height:100vh;display:grid;grid-template-columns:280px minmax(0,1fr);gap:18px;padding:18px}
      .sidebar{height:calc(100vh - 36px)}
      .main-panel{display:grid;gap:18px;min-width:0;min-height:100vh}
      .topbar{min-height:86px}.page-art{min-height:300px}.stats-grid{min-height:124px}.workout-sections{min-height:720px}
    </style>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="preload" href="../css/pages/workout.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" href="../css/responsive.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="../css/pages/workout.css" />
      <link rel="stylesheet" href="../css/responsive.css" />
    </noscript>
  </head>
  <body data-page="workout">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-panel">
        <header class="topbar" id="topbar"></header>
        <section class="page-art" id="page-art"></section>
        <section class="stats-grid" id="stats-grid"></section>
        <section class="workout-sections" id="workout-root"></section>
      </main>
    </div>
    <script src="../js/shared.js" defer></script>
    <script src="../js/workout.js" defer></script>
    <script src="../js/pages/workout.js" defer></script>
  </body>
</html>
